# ==============================================================================
# GENERAL SETTINGS
# ==============================================================================
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Undercurl support for diagnostics on your Dell U2720QM
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -s set-clipboard on

# ==============================================================================
# KEYBINDINGS
# ==============================================================================
bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection

bind-key C-p previous-window
bind-key C-n next-window

# Cross-platform clipboard (macOS vs Linux)
if-shell 'test "$(uname)" = "Darwin"' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'

unbind-key -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDown1Pane send -X clear-selection

# Smart pane switching (Vim aware)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key C-l send-keys 'C-l'

bind-key '"' split-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# ==============================================================================
# DYNAMIC HOST-BASED THEME
# ==============================================================================

# Default Accent
%hidden ACCENT_COLOR="colour31"
%hidden HOSTNAME_COLOR="fg=colour235,bg=colour252"

# # Uncomment on servers
# %hidden ACCENT_COLOR="colour64"
# %hidden HOSTNAME_COLOR="fg=colour235,bg=colour210"

set -g status "on"
set -g status-justify "left"
set -g status-style "bg=colour234,none"

set -g status-left "#[fg=colour234,bg=colour254,bold] #S #[fg=colour254,bg=colour234] "
set -g status-left-length "100"

set -g status-right "#[fg=colour247,bg=colour236] %Y-%m-%d | %H:%M #[$HOSTNAME_COLOR] #h "
set -g status-right-length "100"


# Windows
setw -g window-status-current-format "#[fg=colour251,bg=$ACCENT_COLOR]  #I |#[fg=colour231,bg=$ACCENT_COLOR,bold] #W  "
setw -g window-status-format "#[fg=colour244,bg=colour234]  #I |#[fg=colour250,bg=colour234] #W  "
setw -g window-status-separator ""

# UI Elements
set -g pane-active-border-style "fg=colour254"
set -g pane-border-style "fg=colour240"
set -g message-style "bg=$ACCENT_COLOR,fg=colour231"
set -g message-command-style "fg=colour231,bg=$ACCENT_COLOR"
